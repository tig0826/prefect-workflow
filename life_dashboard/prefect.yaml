# Generic metadata about this project
name: flows
prefect-version: 3.1.11

# build section allows you to manage and build docker images
build:
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.4.0
      image_name: "{{ prefect.variables.life_image_name }}"
      tag: latest
      dockerfile: ./Dockerfile
      platform: linux/amd64

# push section allows you to manage if and how this project is uploaded to remote locations
push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.4.0
      image_name: "{{ prefect.variables.life_image_name }}"
      tag: "{{ build-image.tag }}"

# pull section allows you to provide instructions for cloning this project in remote locations
pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect

# the definitions section allows you to define reusable components for your deployments
definitions:
  tags: &common_tags
    - life
  work_pool: &common_work_pool
    name: kubernetes
    job_variables:
      image: "{{ prefect.variables.life_image_name }}"
      env:
        PREFECT_LOGGING_EXTRA_LOGGERS: "fitbit_exporter,asken_exporter,aw_exporter"

# the deployments section allows you to provide configuration for deploying flows
deployments:
  - name: life_bronze_asken
    tags: *common_tags
    entrypoint: asken_exporter/asken_flow.py:asken_flow
    work_pool: *common_work_pool
    schedules:
      # 30分ごと（個人スクレイピング、食事ログの鮮度は30分で十分）
      - cron: "0,30 * * * *"
        timezone: "Asia/Tokyo"
    parameters: {}
    enforce_parameter_schema: true

  - name: life_bronze_fitbit
    tags: *common_tags
    entrypoint: fitbit_exporter/fitbit_flow.py:fitbit_flow
    work_pool: *common_work_pool
    schedules:
      # 15分ごと（Fitbit APIレート150req/h以内、睡眠データ鮮度改善）
      - cron: "*/15 * * * *"
        timezone: "Asia/Tokyo"
    parameters: {}
    enforce_parameter_schema: true

  - name: life_bronze_aw
    tags: *common_tags
    entrypoint: aw_exporter/aw_flow.py:aw_flow
    work_pool: *common_work_pool
    schedules:
      # 15分ごと（ローカルサーバー、負荷なし）
      - cron: "*/15 * * * *"
        timezone: "Asia/Tokyo"
    parameters: {}
    enforce_parameter_schema: true

  - name: life_bronze_owntracks
    tags: *common_tags
    entrypoint: owntracks_exporter/owntracks_flow.py:owntracks_flow
    work_pool: *common_work_pool
    schedules:
      # 廃止予定のため変更なし
      - cron: "10 * * * *"
        timezone: "Asia/Tokyo"
    parameters: {}
    enforce_parameter_schema: true

  - name: life_data_pipeline
    tags: *common_tags
    entrypoint: dbt_lifeos/main_data_flow.py:main_data_flow
    work_pool: *common_work_pool
    concurrency_limit: 1
    schedules:
      # 15分ごと・エクスポートの5分後（:00/:15/:30/:45 export → :05/:20/:35/:50 dbt）
      - cron: "5,20,35,50 * * * *"
        timezone: "Asia/Tokyo"
    parameters: {}
    enforce_parameter_schema: true

  - name: life_ai_feedback_morning
    tags: *common_tags
    entrypoint: ai_feedback/ai_feedback_flow.py:ai_feedback_flow
    work_pool: *common_work_pool
    schedules:
      - cron: "0 8 * * *"
        timezone: "Asia/Tokyo"
    parameters:
      slot: "morning"
    enforce_parameter_schema: false

  - name: life_ai_feedback_noon
    tags: *common_tags
    entrypoint: ai_feedback/ai_feedback_flow.py:ai_feedback_flow
    work_pool: *common_work_pool
    schedules:
      - cron: "0 13 * * *"
        timezone: "Asia/Tokyo"
    parameters:
      slot: "noon"
    enforce_parameter_schema: false

  - name: life_ai_feedback_night
    tags: *common_tags
    entrypoint: ai_feedback/ai_feedback_flow.py:ai_feedback_flow
    work_pool: *common_work_pool
    schedules:
      - cron: "0 22 * * *"
        timezone: "Asia/Tokyo"
    parameters:
      slot: "night"
    enforce_parameter_schema: false

  - name: life_timeline_sync
    tags: *common_tags
    entrypoint: timeline_exporter/timeline_flow.py:timeline_sync_flow
    work_pool: *common_work_pool
    schedules:
      - cron: "0 */6 * * *"
        timezone: "Asia/Tokyo"
    parameters: {}
    enforce_parameter_schema: true


  - name: life_iceberg_compaction
    tags: *common_tags
    entrypoint: common/compaction_flow.py:iceberg_compaction_flow
    work_pool: *common_work_pool
    schedules:
      # 毎週日曜日 03:00 JST（パイプラインの稼働が少ない時間帯）
      - cron: "0 3 * * 0"
        timezone: "Asia/Tokyo"
    parameters: {}
    enforce_parameter_schema: true
