# aw-server-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aw-server
  namespace: aw # 必要に応じて変更
  labels:
    app: aw-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aw-server
  template:
    metadata:
      labels:
        app: aw-server
    spec:
      containers:
      - name: aw-server
        # 先ほどビルドしたイメージ名を指定
        image: tig0826/aw-server-rust:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5600
        volumeMounts:
        - name: aw-data
          mountPath: /root/.local/share/activitywatch
      volumes:
      - name: aw-data
        persistentVolumeClaim:
          claimName: aw-data-pvc

---
# aw-server-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: aw-server
  namespace: aw
spec:
  selector:
    app: aw-server
  ports:
    - protocol: TCP
      port: 5600
      targetPort: 5600
  type: ClusterIP

---
# aw-server-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aw-server-ingress
  namespace: aw
  annotations:
    # Ingress Controllerに合わせて変更 (例: nginx)
    # kubernetes.io/ingress.class: traefik
    # 必要に応じてSSL設定やBasic認証などを追加
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  rules:
  - host: aw.mynet # 実際のドメインに変更
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aw-server
            port:
              number: 5600
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aw-data-pvc
  namespace: aw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: nfs-csi
